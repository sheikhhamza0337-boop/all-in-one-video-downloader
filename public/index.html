<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALL IN ONE VIDEO DOWNLOADER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  /* Font stack: Nofex first (if locally installed), falls back to a
     kindred geometric-grotesk loaded from Google Fonts. */
  @font-face {
    font-family: "Nofex";
    src: local("Nofex"), local("Nofex-Bold");
    font-weight: 700;
  }

  :root {
    --charcoal-violet: #3c1a47;
    --charcoal-violet-deep: #220e2a;
    --charcoal-violet-panel: #4b2159;
    --cyber-lime: #b6ff00;
    --cyber-lime-dim: #8ecf00;
    --ink: #f4eefb;
    --ink-muted: #b9a4c6;
    --danger: #ff5577;
    --font-display: "Nofex", "Space Grotesk", sans-serif;
    --font-body: "Inter", sans-serif;
    --font-mono: "JetBrains Mono", monospace;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    min-height: 100vh;
    font-family: var(--font-body);
    color: var(--ink);
    background:
      radial-gradient(circle at 15% -10%, rgba(182,255,0,0.10), transparent 40%),
      radial-gradient(circle at 110% 10%, rgba(182,255,0,0.06), transparent 45%),
      linear-gradient(160deg, var(--charcoal-violet-deep) 0%, var(--charcoal-violet) 55%, #341440 100%);
    background-attachment: fixed;
    padding: 0 0 80px;
    overflow-x: hidden;
  }

  /* faint scanline texture for the "cyber" feel */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px,
      transparent 1px, transparent 3px
    );
    z-index: 0;
  }

  .wrap { max-width: 560px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

  /* ---------- Header ---------- */
  header {
    padding: 56px 0 28px;
    text-align: center;
    animation: dropIn 0.7s cubic-bezier(.2,.9,.25,1) both;
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--cyber-lime);
    border: 1px solid rgba(182,255,0,0.35);
    padding: 5px 12px;
    border-radius: 100px;
    margin-bottom: 20px;
    background: rgba(182,255,0,0.05);
  }
  .eyebrow .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--cyber-lime);
    box-shadow: 0 0 8px var(--cyber-lime);
    animation: pulse 1.6s ease-in-out infinite;
  }

  h1 {
    font-family: var(--font-display);
    font-weight: 700;
    font-size: clamp(30px, 7vw, 44px);
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin: 0 0 12px;
    color: var(--ink);
    text-shadow: 0 0 34px rgba(182,255,0,0.18);
  }
  h1 span { color: var(--cyber-lime); }

  .lede {
    color: var(--ink-muted);
    font-size: 15px;
    max-width: 380px;
    margin: 0 auto 26px;
    line-height: 1.5;
  }

  .platforms {
    display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
  }
  .platforms span {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.04em;
    padding: 6px 12px;
    border-radius: 6px;
    border: 1px solid rgba(244,238,251,0.14);
    color: var(--ink-muted);
    background: rgba(255,255,255,0.02);
    transition: border-color .2s, color .2s;
  }
  .platforms span:hover { border-color: var(--cyber-lime); color: var(--cyber-lime); }

  /* ---------- HUD Card ---------- */
  .card {
    position: relative;
    background: linear-gradient(180deg, rgba(75,33,89,0.55), rgba(34,14,42,0.55));
    backdrop-filter: blur(10px);
    border: 1px solid rgba(244,238,251,0.10);
    border-radius: 18px;
    padding: 22px;
    margin-top: 22px;
    animation: dropIn 0.7s cubic-bezier(.2,.9,.25,1) both;
    animation-delay: 0.08s;
  }
  .card::before, .card::after {
    content: "";
    position: absolute;
    width: 16px; height: 16px;
    border-color: var(--cyber-lime);
    opacity: 0.55;
  }
  .card::before { top: -1px; left: -1px; border-top: 2px solid; border-left: 2px solid; border-radius: 6px 0 0 0; }
  .card::after { bottom: -1px; right: -1px; border-bottom: 2px solid; border-right: 2px solid; border-radius: 0 0 6px 0; }

  .field-label {
    font-family: var(--font-mono);
    font-size: 10.5px;
    letter-spacing: 0.12em;
    color: var(--cyber-lime-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 14px 15px;
    border-radius: 10px;
    border: 1px solid rgba(244,238,251,0.14);
    background: rgba(20,8,25,0.55);
    color: var(--ink);
    font-family: var(--font-body);
    font-size: 15px;
    outline: none;
    transition: border-color .18s, box-shadow .18s;
  }
  input::placeholder { color: rgba(185,164,198,0.55); }
  input:focus {
    border-color: var(--cyber-lime);
    box-shadow: 0 0 0 3px rgba(182,255,0,0.12);
  }

  button {
    width: 100%;
    padding: 15px;
    border-radius: 10px;
    border: none;
    font-family: var(--font-body);
    font-weight: 600;
    font-size: 14.5px;
    letter-spacing: 0.01em;
    cursor: pointer;
    margin-top: 12px;
    transition: transform .15s ease, box-shadow .15s ease, opacity .15s ease;
  }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  .btn-primary {
    background: var(--cyber-lime);
    color: #17140a;
  }
  .btn-primary:hover:not(:disabled) {
    box-shadow: 0 0 0 1px var(--cyber-lime), 0 0 24px rgba(182,255,0,0.45);
  }

  .btn-download {
    background: transparent;
    color: var(--cyber-lime);
    border: 1.5px solid var(--cyber-lime);
    position: relative;
    overflow: hidden;
  }
  .btn-download:hover:not(:disabled) {
    background: rgba(182,255,0,0.08);
    box-shadow: 0 0 22px rgba(182,255,0,0.28);
  }

  /* ---------- Video preview ---------- */
  .video-info { display: none; margin-top: 18px; animation: dropIn 0.5s ease both; }
  .thumb-wrap {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 12px;
    border: 1px solid rgba(244,238,251,0.10);
  }
  .thumb-wrap img { width: 100%; display: block; aspect-ratio: 16/9; object-fit: cover; }
  .thumb-wrap .duration-chip {
    position: absolute;
    bottom: 8px; right: 8px;
    font-family: var(--font-mono);
    font-size: 11px;
    background: rgba(10,4,13,0.75);
    color: var(--cyber-lime);
    padding: 3px 8px;
    border-radius: 5px;
    border: 1px solid rgba(182,255,0,0.3);
  }

  .video-title { font-size: 15px; font-weight: 600; line-height: 1.4; margin-bottom: 3px; }
  .video-meta { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-muted); margin-bottom: 18px; }

  /* ---------- Mode toggle ---------- */
  .mode-toggle {
    display: flex;
    background: rgba(20,8,25,0.55);
    border: 1px solid rgba(244,238,251,0.10);
    border-radius: 10px;
    padding: 4px;
    gap: 4px;
  }
  .mode-toggle button {
    flex: 1; margin: 0; padding: 10px;
    background: transparent; color: var(--ink-muted);
    font-size: 13px; border-radius: 7px;
  }
  .mode-toggle button.active {
    background: var(--charcoal-violet-panel);
    color: var(--ink);
    box-shadow: inset 0 0 0 1px rgba(182,255,0,0.4);
  }

  /* ---------- Clip timing ---------- */
  .clip-panel { display: none; margin-top: 16px; animation: dropIn 0.4s ease both; }
  .time-row { display: flex; gap: 10px; }
  .time-group { flex: 1; }
  .time-inputs { display: flex; align-items: center; gap: 4px; }
  .time-inputs input {
    text-align: center;
    padding: 11px 4px;
    font-family: var(--font-mono);
    font-size: 15px;
  }
  .time-inputs .colon { color: var(--cyber-lime); font-family: var(--font-mono); font-weight: 600; }
  .time-hint { font-family: var(--font-mono); font-size: 10px; color: var(--ink-muted); text-align: center; margin-top: 4px; }

  /* ---------- Status ---------- */
  .status {
    font-family: var(--font-mono);
    font-size: 12.5px;
    margin-top: 12px;
    padding: 11px 13px;
    border-radius: 9px;
    display: none;
    line-height: 1.5;
  }
  .status.error { background: rgba(255,85,119,0.10); color: var(--danger); border: 1px solid rgba(255,85,119,0.3); display: block; }
  .status.loading { background: rgba(182,255,0,0.06); color: var(--cyber-lime); border: 1px solid rgba(182,255,0,0.25); display: block; }
  .status.success { background: rgba(182,255,0,0.10); color: var(--cyber-lime); border: 1px solid rgba(182,255,0,0.35); display: block; }

  .spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid rgba(182,255,0,0.25);
    border-top-color: var(--cyber-lime);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }

  footer {
    text-align: center;
    margin-top: 40px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: rgba(185,164,198,0.5);
    letter-spacing: 0.04em;
  }

  /* ---------- Animations ---------- */
  @keyframes dropIn {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow"><span class="dot"></span>YOUTUBE · INSTAGRAM · TWITCH · FACEBOOK · TIKTOK</div>
    <h1>ALL IN ONE<br><span>VIDEO DOWNLOADER</span></h1>
    <p class="lede">Paste a link. Download the full video, or cut a precise clip by timestamp — in the best quality available.</p>
  </header>

  <div class="card">
    <label class="field-label" for="urlInput">Video URL</label>
    <input type="text" id="urlInput" placeholder="https://..." autocomplete="off" />
    <button class="btn-primary" id="fetchBtn">Check Video</button>
    <div class="status" id="fetchStatus"></div>

    <div class="video-info" id="videoInfo">
      <div class="thumb-wrap">
        <img id="thumb" src="" alt="Video thumbnail" />
        <span class="duration-chip" id="durationChip"></span>
      </div>
      <div class="video-title" id="vidTitle"></div>
      <div class="video-meta" id="vidMeta"></div>

      <div class="mode-toggle">
        <button id="fullModeBtn" class="active">Full Video</button>
        <button id="clipModeBtn">Clip a Section</button>
      </div>

      <div class="clip-panel" id="clipPanel">
        <div class="time-row">
          <div class="time-group">
            <label class="field-label">Start</label>
            <div class="time-inputs">
              <input type="number" id="startMin" min="0" value="0" placeholder="00" />
              <span class="colon">:</span>
              <input type="number" id="startSec" min="0" max="59" value="0" placeholder="00" />
            </div>
            <div class="time-hint">MIN&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;SEC</div>
          </div>
          <div class="time-group">
            <label class="field-label">End</label>
            <div class="time-inputs">
              <input type="number" id="endMin" min="0" value="0" placeholder="00" />
              <span class="colon">:</span>
              <input type="number" id="endSec" min="0" max="59" value="30" placeholder="00" />
            </div>
            <div class="time-hint">MIN&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;SEC</div>
          </div>
        </div>
      </div>

      <button class="btn-download" id="downloadBtn">Download</button>
      <div class="status" id="downloadStatus"></div>
    </div>
  </div>

  <footer>BUILT FOR SPEED · YOUR LINKS ARE NOT STORED</footer>
</div>

<script>
const API = "";
let currentUrl = "";
let mode = "full";

const urlInput = document.getElementById("urlInput");
const fetchBtn = document.getElementById("fetchBtn");
const fetchStatus = document.getElementById("fetchStatus");
const videoInfo = document.getElementById("videoInfo");
const thumb = document.getElementById("thumb");
const durationChip = document.getElementById("durationChip");
const vidTitle = document.getElementById("vidTitle");
const vidMeta = document.getElementById("vidMeta");
const fullModeBtn = document.getElementById("fullModeBtn");
const clipModeBtn = document.getElementById("clipModeBtn");
const clipPanel = document.getElementById("clipPanel");
const downloadBtn = document.getElementById("downloadBtn");
const downloadStatus = document.getElementById("downloadStatus");

function setStatus(el, type, msg) {
  el.className = "status " + type;
  el.innerHTML = type === "loading" ? `<span class="spinner"></span>${msg}` : msg;
}
function clearStatus(el) {
  el.className = "status";
  el.innerHTML = "";
}
function formatDuration(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${m}:${String(s).padStart(2, "0")}`;
}

fetchBtn.addEventListener("click", async () => {
  const url = urlInput.value.trim();
  if (!url) return setStatus(fetchStatus, "error", "Paste a video link first.");

  clearStatus(fetchStatus);
  videoInfo.style.display = "none";
  fetchBtn.disabled = true;
  setStatus(fetchStatus, "loading", "Reading video details...");

  try {
    const res = await fetch(`${API}/api/info`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Could not read this link.");

    currentUrl = url;
    thumb.src = data.thumbnail || "";
    durationChip.textContent = formatDuration(data.duration || 0);
    vidTitle.textContent = data.title || "Untitled";
    vidMeta.textContent = `${data.uploader || "Unknown creator"} · ${data.extractor || ""}`;
    document.getElementById("endMin").value = Math.floor((data.duration || 30) / 60);
    document.getElementById("endSec").value = Math.floor((data.duration || 30) % 60);

    videoInfo.style.display = "block";
    clearStatus(fetchStatus);
  } catch (e) {
    setStatus(fetchStatus, "error", e.message);
  } finally {
    fetchBtn.disabled = false;
  }
});

fullModeBtn.addEventListener("click", () => {
  mode = "full";
  fullModeBtn.classList.add("active");
  clipModeBtn.classList.remove("active");
  clipPanel.style.display = "none";
});
clipModeBtn.addEventListener("click", () => {
  mode = "clip";
  clipModeBtn.classList.add("active");
  fullModeBtn.classList.remove("active");
  clipPanel.style.display = "block";
});

downloadBtn.addEventListener("click", async () => {
  if (!currentUrl) return;
  clearStatus(downloadStatus);
  downloadBtn.disabled = true;

  try {
    let res, blobName;

    if (mode === "full") {
      setStatus(downloadStatus, "loading", "Downloading full video — this can take a moment...");
      res = await fetch(`${API}/api/download`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: currentUrl }),
      });
      blobName = "video.mp4";
    } else {
      const startSeconds = (+document.getElementById("startMin").value || 0) * 60 + (+document.getElementById("startSec").value || 0);
      const endSeconds = (+document.getElementById("endMin").value || 0) * 60 + (+document.getElementById("endSec").value || 0);
      if (endSeconds <= startSeconds) throw new Error("End time must be after start time.");

      setStatus(downloadStatus, "loading", "Cutting your clip...");
      res = await fetch(`${API}/api/clip`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url: currentUrl, startSeconds, endSeconds }),
      });
      blobName = "clip.mp4";
    }

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || "Download failed.");
    }

    const blob = await res.blob();
    const downloadUrl = window.URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = downloadUrl;
    a.download = blobName;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.URL.revokeObjectURL(downloadUrl);

    setStatus(downloadStatus, "success", "Done — check your downloads folder.");
  } catch (e) {
    setStatus(downloadStatus, "error", e.message);
  } finally {
    downloadBtn.disabled = false;
  }
});
</script>
</body>
</html>
